name: PR Check-in Accessibility Simulation

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Rendered URL to test (preview/staging/live) for simulation runs'
        required: true
        default: 'https://quickstart.arizona.edu'
      non_blocking:
        description: 'Run in non-blocking mode (true/false)'
        required: true
        default: 'true'
      file_issues:
        description: 'Create GitHub issues from findings (manual only)'
        required: true
        default: false
        type: boolean

jobs:
  pr_simulation_scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve target URL
        id: target
        shell: bash
        run: |
          TARGET="${{ inputs.target_url }}"
          echo "target=$TARGET" >> "$GITHUB_OUTPUT"

      - name: Discover URLs from target
        id: discover
        uses: ./.github/actions/discover
        with:
          seed_urls: |
            ${{ steps.target.outputs.target }}
          sitemap_urls: |
            ${{ steps.target.outputs.target }}/sitemap.xml
          max_depth: 1
          max_urls: 120
          crawl_enabled: true

      - name: Scan discovered URLs (PR simulation)
        id: scan
        if: ${{ inputs.file_issues == true }}
        uses: github/accessibility-scanner@v3
        continue-on-error: ${{ inputs.non_blocking == 'true' }}
        with:
          url_configs: ${{ steps.discover.outputs.url_configs }}
          repository: accesswatch/qs-proposal
          token: ${{ secrets.GH_TOKEN }}
          cache_key: pr-sim-${{ github.event.pull_request.number || github.run_id }}.json
          include_screenshots: true
          open_grouped_issues: true
          scans: '["axe","reflow-scan"]'

      - name: PR summary
        if: always()
        shell: bash
        run: |
          {
            echo "### Accessibility PR Simulation"
            echo ""
            echo "- Target URL: \`${{ steps.target.outputs.target }}\`"
            echo "- Discovered URL count: \`${{ steps.discover.outputs.count }}\`"
            echo "- Mode: \`${{ inputs.non_blocking == 'true' && 'non-blocking' || 'enforced' }}\`"
            echo "- Issue filing enabled: \`${{ inputs.file_issues }}\`"
            echo "- Scan step outcome: \`${{ steps.scan.outcome || 'skipped' }}\`"
            echo ""
            echo "Issue filing is manual-only and must be explicitly enabled."
          } >> "$GITHUB_STEP_SUMMARY"
