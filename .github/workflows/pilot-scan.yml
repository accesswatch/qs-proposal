name: Pilot Accessibility Scan (Quickstart + GLOW)

on:
  workflow_dispatch:
    inputs:
      file_issues:
        description: 'Create GitHub issues from findings (manual only)'
        required: true
        default: false
        type: boolean

jobs:
  quickstart_scan:
    name: Quickstart Discovery + Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout proposal repo
        uses: actions/checkout@v4

      - name: Discover Quickstart URLs
        id: discover_quickstart
        uses: ./.github/actions/discover
        with:
          seed_urls: |
            https://quickstart.arizona.edu
          sitemap_urls: |
            https://quickstart.arizona.edu/sitemap.xml
          include_domains: |
            quickstart.arizona.edu
          exclude_url_patterns: |
            /user/
            /admin/
            \?page=
          max_depth: 1
          max_urls: 150
          crawl_enabled: true

      - name: Scan Quickstart discovered URLs
        if: ${{ inputs.file_issues == true }}
        id: scan_quickstart
        uses: github/accessibility-scanner@v3
        with:
          url_configs: ${{ steps.discover_quickstart.outputs.url_configs }}
          repository: accesswatch/qs-proposal
          token: ${{ secrets.GH_TOKEN }}
          cache_key: quickstart-arizona-edu-production.json
          include_screenshots: true
          open_grouped_issues: true
          scans: '["axe","reflow-scan"]'

      - name: Quickstart summary
        if: always()
        shell: bash
        run: |
          {
            echo "### Quickstart Discovery + Scan"
            echo ""
            echo "- URL count: \`${{ steps.discover_quickstart.outputs.url_count }}\`"
            echo "- Issue filing enabled: \`${{ inputs.file_issues }}\`"
            echo "- Scan step outcome: \`${{ steps.scan_quickstart.outcome || 'skipped' }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  glow_scan:
    name: GLOW Discovery + Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout proposal repo
        uses: actions/checkout@v4

      - name: Discover GLOW URLs
        id: discover_glow
        uses: ./.github/actions/discover
        with:
          seed_urls: |
            https://www.letitglow.app
          sitemap_urls: |
            https://www.letitglow.app/sitemap.xml
          include_domains: |
            www.letitglow.app
            letitglow.app
          exclude_url_patterns: |
            /wp-admin/
            \?replytocom=
          max_depth: 1
          max_urls: 120
          crawl_enabled: true

      - name: Scan GLOW discovered URLs
        if: ${{ inputs.file_issues == true }}
        id: scan_glow
        uses: github/accessibility-scanner@v3
        with:
          url_configs: ${{ steps.discover_glow.outputs.url_configs }}
          repository: accesswatch/qs-proposal
          token: ${{ secrets.GH_TOKEN }}
          auth_context: ${{ secrets.GLOW_AUTH_CONTEXT }}
          cache_key: glow-production.json
          include_screenshots: true
          open_grouped_issues: true
          scans: '["axe","reflow-scan"]'

      - name: GLOW summary
        if: always()
        shell: bash
        run: |
          {
            echo "### GLOW Discovery + Scan"
            echo ""
            echo "- URL count: \`${{ steps.discover_glow.outputs.url_count }}\`"
            echo "- Issue filing enabled: \`${{ inputs.file_issues }}\`"
            echo "- Scan step outcome: \`${{ steps.scan_glow.outcome || 'skipped' }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
