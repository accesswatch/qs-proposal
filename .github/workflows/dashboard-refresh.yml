name: Dashboard Refresh

on:
  workflow_dispatch:
  schedule:
    - cron: '30 13 * * 1'

permissions:
  contents: write
  issues: read

jobs:
  refresh_dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update dashboard data from issues
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DASHBOARD_REPOSITORY: ${{ github.repository }}
        run: node scripts/update-dashboard-data.mjs

      - name: Build static dashboard report
        run: node scripts/export-static-dashboard-report.mjs

      - name: Commit dashboard updates
        run: |
          if [[ -n "$(git status --porcelain dashboard/data dashboard/static)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add dashboard/data dashboard/static
            git commit -m "Refresh dashboard data snapshots"
            git push
          else
            echo "No dashboard data changes."
          fi
